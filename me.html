<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Line Animation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #19057B, #000000);
      font-family: monospace;
      color: white;
      overflow: hidden;
    }

    .top-left-logo {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 80px;
      height: auto;
      z-index: 1000;
    }

    .typewriter h1 {
      overflow: hidden;
      border-right: .15em solid orange;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .15em;
      animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: orange; }
    }

    svg {
      width: 80%;
      max-width: 600px;
      margin-top: 40px;
      filter: drop-shadow(0 0 6px #64ffda);
    }

    path {
      stroke: #fff;
      stroke-width: 25;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      opacity: 0;
      animation: draw 3s ease forwards;
    }

    path:nth-child(1) { animation-delay: 0.2s; }
    path:nth-child(2) { animation-delay: 0.6s; }
    path:nth-child(3) { animation-delay: 1s; }
    path:nth-child(4) { animation-delay: 1.4s; }
    path:nth-child(5) { animation-delay: 1.8s; }
    path:nth-child(6) { animation-delay: 2.2s; }
    path:nth-child(7) { animation-delay: 2.6s; }
    path:nth-child(8) { animation-delay: 3s; }

    @keyframes draw {
      0% {
        stroke-dashoffset: 1000;
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    
  </style>
</head>
